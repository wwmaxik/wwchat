name: Flutter CI + Build + Release

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build_web:
    needs: analyze_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href=/wwchat/

      - name: Create zip archive
        run: cd build/web && zip -r ../../wwchat-web.zip .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}

            **What's included:**
            - Web build (wwchat-web.zip)
            - Live demo: https://wwmaxik.github.io/wwchat/
          files: wwchat-web.zip
          draft: false
          prerelease: false

  deploy_pages:
    needs: build_web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build_android:
    needs: analyze_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create placeholder google-services.json
        run: |
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "ru.wwmaxik.wwchat"
                  }
                },
                "api_key": [{"current_key": "AIzaSyPlaceholderKeyForCiBuildOnly"}],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          GSJSON

      - name: Build Android APK (debug-signed)
        run: flutter build apk --debug

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}

            **What's included:**
            - Web build (wwchat-web.zip)
            - Android APK debug-signed (wwchat-debug.apk)
            - Live demo: https://wwmaxik.github.io/wwchat/
          files: build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: false
          append_body: true
